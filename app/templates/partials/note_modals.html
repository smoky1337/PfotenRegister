<div class="modal fade" id="editNotizenModal" tabindex="-1" aria-labelledby="editNotizenModalLabel" aria-hidden="true">
    <div class="modal-dialog app-modal-dialog">
        <div class="modal-content app-modal-content">
            <form id="editNotizenForm" method="post" action="{{ url_for('guest.edit_notes', guest_id=guest.id) }}">
                <div class="modal-header app-modal-header">
                    <div class="app-modal-title-block">
                        <p class="app-modal-kicker">Gastprofil</p>
                        <h5 class="modal-title app-modal-title" id="editNotizenModalLabel">Notizen bearbeiten</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body app-modal-body">
                    <div class="app-modal-section">
                        <label for="notizenInput" class="form-label fw-semibold">Notizen</label>
                        <textarea class="form-control" id="notizenInput" name="notizen" rows="6">{{ guest.notes }}</textarea>
                    </div>
                </div>
                <div class="modal-footer app-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% for animal in animals %}
    <div class="modal fade" id="editNotizenModal{{ animal.id }}" tabindex="-1" aria-labelledby="editNotizenModalLabel{{ animal.id }}" aria-hidden="true">
        <div class="modal-dialog app-modal-dialog">
            <div class="modal-content app-modal-content">
                <form method="post" action="{{ url_for('animal.edit_animal_note', animal_id=animal.id, guest_id=guest.id) }}">
                    <div class="modal-header app-modal-header">
                        <div class="app-modal-title-block">
                            <p class="app-modal-kicker">Tierprofil</p>
                            <h5 class="modal-title app-modal-title" id="editNotizenModalLabel{{ animal.id }}">Notizen für {{ animal.name or 'Tier' }}</h5>
                        </div>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                    </div>
                    <div class="modal-body app-modal-body">
                        <div class="app-modal-section">
                            <label for="tierNotizenInput{{ animal.id }}" class="form-label fw-semibold">Notizen</label>
                            <textarea class="form-control" id="tierNotizenInput{{ animal.id }}" name="notizen" rows="6">{{ animal.note }}</textarea>
                            <input type="hidden" name="tier_id" value="{{ animal.id }}">
                        </div>
                    </div>
                    <div class="modal-footer app-modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
                        <button type="submit" class="btn btn-success">Speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endfor %}
