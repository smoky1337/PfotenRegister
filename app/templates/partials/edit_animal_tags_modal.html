<div class="modal fade" id="editAnimalTagsModal{{ animal.id }}" tabindex="-1" aria-labelledby="editAnimalTagsModalLabel{{ animal.id }}" aria-hidden="true">
    <div class="modal-dialog app-modal-dialog">
        <div class="modal-content app-modal-content">
            <form method="post" action="{{ url_for('animal.edit_animal_tags', animal_id=animal.id) }}">
                <div class="modal-header app-modal-header">
                    <div class="app-modal-title-block">
                        <p class="app-modal-kicker">Tierprofil</p>
                        <h5 class="modal-title app-modal-title" id="editAnimalTagsModalLabel{{ animal.id }}">Tags für {{ animal.name or 'Tier' }} bearbeiten</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body app-modal-body">
                    <div class="app-modal-section">
                        <p class="app-modal-copy mb-3">Tags steuern die Futterlogik und die Darstellung im Tierbestand. Mehrere Tags können gleichzeitig zugewiesen werden.</p>
                        <div class="app-modal-check-grid">
                            {% for tag in all_tags %}
                                <label class="app-modal-check-card">
                                    <input class="form-check-input mt-0" type="checkbox" name="tag_ids" id="animal_{{ animal.id }}_tag_{{ tag.id }}" value="{{ tag.id }}" {% if tag in animal.food_tags %}checked{% endif %}>
                                    <span class="badge" style="background-color: {{ tag.color }}; color: #fff;">{{ tag.name }}</span>
                                </label>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                <div class="modal-footer app-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>
</div>
