<div class="modal fade" id="addMessageModal" tabindex="-1" aria-labelledby="addMessageModalLabel" aria-hidden="true">
    <div class="modal-dialog app-modal-dialog">
        <form method="post" action="{{ url_for('guest.add_message', guest_id=guest.id) }}">
            <div class="modal-content app-modal-content">
                <div class="modal-header app-modal-header is-info">
                    <div class="app-modal-title-block">
                        <p class="app-modal-kicker">Hinweise</p>
                        <h5 class="modal-title app-modal-title" id="addMessageModalLabel">Neuen Hinweis anlegen</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body app-modal-body">
                    <div class="app-modal-section">
                        <p class="app-modal-copy mb-3">Hinweise bleiben sichtbar, bis sie aktiv als erledigt markiert werden. Sie eignen sich für offene Rückfragen, Ausnahmen oder Absprachen im Team.</p>
                        <label for="messageText" class="form-label fw-semibold">Hinweis</label>
                        <textarea id="messageText" name="message" class="form-control" rows="5" required></textarea>
                    </div>
                </div>
                <div class="modal-footer app-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </div>
        </form>
    </div>
</div>
