<div class="modal fade" id="editAccessoriesModal{{ entry.id }}" tabindex="-1" aria-labelledby="editAccessoriesModalLabel{{ entry.id }}" aria-hidden="true">
    <div class="modal-dialog app-modal-dialog">
        <div class="modal-content app-modal-content">
            <form method="post" action="{{ url_for('accessories.edit_accessory', entry_id=entry.id) }}">
                <div class="modal-header app-modal-header">
                    <div class="app-modal-title-block">
                        <p class="app-modal-kicker">Versorgung</p>
                        <h5 class="modal-title app-modal-title" id="editAccessoriesModalLabel{{ entry.id }}">Zubehör bearbeiten</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body app-modal-body">
                    <div class="app-modal-section">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="editAccessoriesDate{{ entry.id }}" class="form-label fw-semibold">Datum</label>
                                <input type="date" class="form-control" id="editAccessoriesDate{{ entry.id }}" name="distributed_on" value="{{ entry.distributed_on.isoformat() if entry.distributed_on else '' }}">
                            </div>
                            <div class="col-12">
                                <label for="editAccessoriesItem{{ entry.id }}" class="form-label fw-semibold">Zubehör</label>
                                <input type="text" class="form-control" id="editAccessoriesItem{{ entry.id }}" name="item" value="{{ entry.item }}" required>
                            </div>
                            <div class="col-12">
                                <label for="editAccessoriesLocation{{ entry.id }}" class="form-label fw-semibold">Ausgabestandort</label>
                                {% if locations_enabled %}
                                    <select class="form-select" id="editAccessoriesLocation{{ entry.id }}" name="dispense_location_id">
                                        {% if dispense_locations|length == 0 %}
                                            <option value="">Kein Ausgabestandort verfügbar</option>
                                        {% else %}
                                            <option value="">Keiner ausgewählt</option>
                                            {% for loc in dispense_locations %}
                                                <option value="{{ loc.id }}" {% if entry.location_id == loc.id %}selected{% endif %}>{{ loc.name }}{% if loc.address %} – {{ loc.address }}{% endif %}</option>
                                            {% endfor %}
                                        {% endif %}
                                    </select>
                                {% endif %}
                            </div>
                            <div class="col-12">
                                <label for="editAccessoriesComment{{ entry.id }}" class="form-label fw-semibold">Kommentar</label>
                                <textarea class="form-control" id="editAccessoriesComment{{ entry.id }}" name="comment" rows="4">{{ entry.comment or '' }}</textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer app-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </form>
        </div>
    </div>
</div>
